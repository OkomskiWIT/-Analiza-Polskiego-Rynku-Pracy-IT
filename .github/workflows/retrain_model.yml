name: Auto-Retrain ML Model

on:
  # Uruchamiaj co tydzień, w niedzielę o 3:00 w nocy
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v3

    - name: Instalacja środowiska Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Trening algorytmu AI (Zaciąganie danych z bazy)
      env:
        DB_URL: ${{ secrets.DB_URL }}
      run: |
        python train_model.py

    - name: Zapisanie nowych plików .pkl w repozytorium
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add salary_model.pkl model_columns.pkl
        
        # Jeśli pliki się zmieniły (model nauczył się czegoś nowego), to zrób commit i push
        git diff --quiet && git diff --staged --quiet || (git commit -m "bot: aktualizacja wag modelu ML na bazie nowych danych z Neona" && git push)